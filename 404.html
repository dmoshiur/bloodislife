{% extends "base.html" %}
{% block title %}Admin Reply - LifeFlow{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header bg-danger text-white py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="fas fa-user-shield"></i> Admin Reply</h4>
                        <a href="{{ url_for('admin_messages') }}" class="btn btn-sm btn-light"><i class="fas fa-arrow-left"></i> Back</a>
                    </div>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-user fa-2x me-3"></i>
                            <div>
                                <h5 class="mb-1">{{ original.sender.name }}</h5>
                                <p class="mb-0">{{ original.sender.email }}</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4 p-3 bg-light rounded">
                        <h6 class="text-muted mb-2">Original Message:</h6>
                        <h5 class="mb-2">{{ original.subject }}</h5>
                        <p class="mb-3">{{ original.content }}</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Your Reply (as Admin):</label>
                            <textarea name="content" class="form-control" rows="6" required placeholder="Type your administrative reply..."></textarea>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg"><i class="fas fa-paper-plane"></i> Send Reply to User</button>
                            <a href="{{ url_for('admin_messages') }}" class="btn btn-outline-secondary"><i class="fas fa-times"></i> Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
