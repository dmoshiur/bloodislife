{% extends "base.html" %}
{% block title %}Request Blood - LifeFlow{% endblock %}

{% block content %}
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('home') }}">Home</a></li>
            <li class="breadcrumb-item active">Request Blood</li>
        </ol>
    </nav>
    
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-tint"></i> Request Blood for Patient</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <!-- Patient Info -->
                        <h5 class="text-badhan mb-3"><i class="fas fa-user-injured"></i> Patient Information</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Patient Name *</label>
                                <input type="text" name="patient_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Relation to Patient</label>
                                <select name="patient_relation" class="form-select">
                                    <option value="Self">Self</option>
                                    <option value="Father">Father</option>
                                    <option value="Mother">Mother</option>
                                    <option value="Brother">Brother</option>
                                    <option value="Sister">Sister</option>
                                    <option value="Spouse">Spouse</option>
                                    <option value="Child">Child</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Blood Group *</label>
                                <select name="blood_group" class="form-select" required>
                                    <option value="">Select Blood Group</option>
                                    <option value="A+">A+</option><option value="A-">A-</option>
                                    <option value="B+">B+</option><option value="B-">B-</option>
                                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                                    <option value="O+">O+</option><option value="O-">O-</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Quantity Needed</label>
                                <select name="quantity" class="form-select">
                                    <option value="1 unit">1 unit</option>
                                    <option value="2 units">2 units</option>
                                    <option value="3 units">3 units</option>
                                    <option value="More">More than 3 units</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Hospital Info -->
                        <h5 class="text-badhan mb-3"><i class="fas fa-hospital"></i> Hospital Information</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label class="form-label">Hospital Name *</label>
                                <input type="text" name="hospital_name" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Hospital Address *</label>
                                <textarea name="hospital_address" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Division *</label>
                                <select id="division" name="division" class="form-select" required onchange="updateDistricts()"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">District *</label>
                                <select id="district" name="district" class="form-select" required onchange="updateUpazilas()"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Upazila *</label>
                                <select id="upazila" name="upazila" class="form-select" required></select>
                            </div>
                        </div>
                        
                        <!-- Contact Info -->
                        <h5 class="text-badhan mb-3"><i class="fas fa-phone"></i> Contact Information</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Contact Person Name *</label>
                                <input type="text" name="contact_person" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contact Phone *</label>
                                <input type="tel" name="contact_phone" class="form-control" placeholder="017..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contact Email (Optional)</label>
                                <input type="email" name="contact_email" class="form-control">
                            </div>
                        </div>
                        
                        <!-- Urgent Option -->
                        <div class="card border-danger mb-4">
                            <div class="card-body">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_urgent" id="is_urgent" onchange="toggleUrgent()">
                                    <label class="form-check-label fw-bold text-danger" for="is_urgent">
                                        <i class="fas fa-exclamation-triangle"></i> This is an URGENT blood request
                                    </label>
                                </div>
                                <div id="urgent_fields" style="display: none;" class="mt-3">
                                    <label class="form-label">Reason for Urgency</label>
                                    <select name="urgent_reason" class="form-select mb-2">
                                        <option value="Accident">Accident/Trauma</option>
                                        <option value="Surgery">Emergency Surgery</option>
                                        <option value="Childbirth">Childbirth Complication</option>
                                        <option value="Disease">Critical Illness</option>
                                        <option value="Other">Other Emergency</option>
                                    </select>
                                    <label class="form-label">Blood Needed By *</label>
                                    <input type="datetime-local" name="needed_by" class="form-control" required>
                                    <small class="text-muted">Select the deadline for blood donation</small>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Additional Info -->
                        <div class="mb-4">
                            <label class="form-label">Additional Information (Optional)</label>
                            <textarea name="additional_info" class="form-control" rows="3" placeholder="Any special instructions or details..."></textarea>
                        </div>
                        
                        <!-- Submit -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-badhan btn-lg">
                                <i class="fas fa-paper-plane"></i> Submit Blood Request
                            </button>
                            <a href="{{ url_for('blood_requests') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> View Existing Requests
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Bangladesh location data (same as register.html)
const bangladeshData = { /* ... paste the same bangladeshData object ... */ };

const divSel = document.getElementById('division');
const distSel = document.getElementById('district');
const upaSel = document.getElementById('upazila');

Object.keys(bangladeshData).forEach(div => {
    let opt = document.createElement('option');
    opt.value = div; opt.innerHTML = div;
    divSel.appendChild(opt);
});

function updateDistricts() {
    distSel.innerHTML = '<option value="">Select District</option>';
    upaSel.innerHTML = '<option value="">Select Upazila</option>';
    const selectedDiv = divSel.value;
    if (selectedDiv && bangladeshData[selectedDiv]) {
        Object.keys(bangladeshData[selectedDiv]).forEach(dist => {
            let opt = document.createElement('option');
            opt.value = dist; opt.innerHTML = dist;
            distSel.appendChild(opt);
        });
    }
}

function updateUpazilas() {
    upaSel.innerHTML = '<option value="">Select Upazila</option>';
    const selectedDiv = divSel.value;
    const selectedDist = distSel.value;
    if (selectedDiv && selectedDist && bangladeshData[selectedDiv][selectedDist]) {
        bangladeshData[selectedDiv][selectedDist].forEach(upa => {
            let opt = document.createElement('option');
            opt.value = upa; opt.innerHTML = upa;
            upaSel.appendChild(opt);
        });
    }
}

function toggleUrgent() {
    const isUrgent = document.getElementById('is_urgent').checked;
    document.getElementById('urgent_fields').style.display = isUrgent ? 'block' : 'none';
}
</script>
{% endblock %}
