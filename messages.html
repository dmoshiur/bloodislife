{% extends "base.html" %}
{% block title %}Send Message - LifeFlow{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white py-3">
                    <h3 class="mb-0"><i class="fas fa-paper-plane"></i> Send Message</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Send To:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recipient_type" id="toAdmin" value="admin" checked onchange="toggleRecipient()">
                                <label class="form-check-label" for="toAdmin"><i class="fas fa-user-shield text-primary"></i> Admin (Support Team)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recipient_type" id="toUser" value="user" onchange="toggleRecipient()">
                                <label class="form-check-label" for="toUser"><i class="fas fa-user text-success"></i> Specific User</label>
                            </div>
                        </div>

                        <div class="mb-3" id="userEmailField" style="display: none;">
                            <label class="form-label fw-bold">Recipient Email:</label>
                            <input type="email" name="recipient_email" class="form-control" placeholder="user@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Subject:</label>
                            <input type="text" name="subject" class="form-control" required placeholder="What is this about?">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Message:</label>
                            <textarea name="content" class="form-control" rows="8" required placeholder="Type your message here..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-paper-plane"></i> Send Message</button>
                            <a href="{{ url_for('messages') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function toggleRecipient() {
    const toUser = document.getElementById('toUser').checked;
    document.getElementById('userEmailField').style.display = toUser ? 'block' : 'none';
}
</script>
{% endblock %}
